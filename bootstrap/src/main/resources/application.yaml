spring:
  application:
    name: chess-backend
  main:
    web-application-type: servlet
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/chess_backend}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:20}
      minimum-idle: ${DB_MIN_IDLE:5}
  sql:
    init:
      mode: always
      schema-locations: classpath:/schema-${DB_PLATFORM:postgresql}.sql

server:
  port: ${SERVER_PORT:8081}

app:
  db:
    vendor: ${DB_VENDOR:postgresql}
  cors:
    allowed-origin-patterns:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
